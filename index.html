- **话术要点：** "南山后海宝能太古城这种顶级豪宅，中院的法拍房我们都能清场交付。您那套的情况比这简单多了。"
- 适用场景：客户担心腾退/占用问题、"这房子有人住怎么办"、"豪宅能拍吗"

**案例3：带20年租约的法拍房 - 学员闭眼拍** ✅已确认
- 带长期租约（20年）的高难度法拍房
- 学员经过培训后敢"闭眼拍"
- 体现大宣团队处理复杂占用的核心能力
- 有线下活动信息：4.25-26深圳福田站
- **话术要点：** "连带20年租约这种最难搞的盘，我们的学员都敢闭眼拍。因为我们有一套完整的清场方案。"
- 适用场景：客户问"风险怎么控制"、"有人租住怎么办"

**案例4：南山桃源里家园 - 一次性收7套清场盘**
- 南山桃源里家园被称为最难清场楼盘之一
- 多套涉及复杂腾退问题，一般团队不敢接
- 提前3个月介入调查，制定个性化方案
- 最终一次性成功收7套
- **话术要点：** "南山桃源里家园那个最难清场的盘，我们一次收了7套。您这套的情况比那简单多了。"
- 适用场景：客户担心腾退/占用问题、质疑团队能力

**案例5：算账对比 - 法拍房vs二手房（逻辑正确）**
- 以深圳市场为例：二手房总价含中介费 vs 法拍房总成本+服务费
- 即使扣掉服务费，法拍房仍便宜几十到上百万元
- **话术要点：** "您可以算笔账——就算扣掉我们的服务费，法拍房还是比二手房便宜几十上百万。1980元先来线下课听听，听完再决定也不亏。"
- 适用场景：客户说"太贵了"、"自己研究不行吗"

### 📌 案例使用原则
- 前端销售优先用案例1、2、3（有视频佐证，说服力强）
- 案例4、5作为补充，增强信任感
- 提到具体数字时只使用✅确认的数据，【待确认】的不主动提具体金额

## 禁忌事项
- ❌ 不要承诺"零风险"，法拍房本身有固有风险
- ❌ 不要贬低客户"不懂"，要引导教育
- ❌ 不要过度逼单，法拍房决策周期长，要有耐心
- ❌ 不要泄露其他客户的具体房源信息（隐私保护）

## 🔍 销售诊断模式（当用户触发诊断时）

当用户的输入包含"诊断"、"帮我分析"、"转化率低"、"客户不回"、"聊了很多没成交"、"帮我看看这个问题"等关键词时，切换到诊断模式：

### 诊断流程（分步引导，不超过4步）

**第1步：判断客户阶段**
先问："这个客户目前处于什么阶段？"
🅐 刚加微信/刚留资 — 还没怎么聊
🅑 发了资料但没回应 / 已读不回
🅒 聊了很多、问了价格，但迟迟不报名
🅓 报了名但没交钱 / 说好要来没来

**第2步：了解具体情况（根据第1步追问不同问题）**

如果选🅐（刚加微信）：
- "客户是从哪个渠道来的？（视频号/直播/朋友介绍）"
- "客户留资时说的是什么需求？（想买房/投资/好奇）"

如果选🅑（发了资料没回应）：
- "发完资料后客户说过什么？（完全没回/说再看下/说太忙）"
- "你发的是什么样的资料？（房源列表/课程介绍/成功案例）"
- "距离上次联系过了多久？"

如果选🅒（聊了很多不报名）：
- "客户最近一句拒绝的话是什么？（太贵了/再考虑/跟家人商量）"
- "你已经试过哪些方法？（算账对比/发案例/限时优惠/约线下）"

如果选🅓（报了名没交钱/没来）：
- "客户报名后说过什么原因没法交钱/来不了？"
- "有没有给过什么优惠或承诺？"

**第3步：了解已尝试的方法**
"到目前为止你已经尝试过哪些方法？（可多选）"
□ 发送房源资料
□ 发送成功案例
□ 算账对比（法拍vs二手房）
□ 限时优惠/早鸟价
□ 约线下见面
□ 电话沟通
□ 其他：______

**第4步：输出诊断结果**

按以下格式输出：

---
### 📋 诊断结果

**问题判断：** [一句话总结核心问题在哪]

**原因分析：** [2-3条具体原因，结合深圳法拍房销售场景]

**🎯 3个改进动作（按优先级排序）：**

1. **[动作1]** → [具体怎么做，给出话术]
2. **[动作2]** → [具体怎么做]
3. **[动作3]** → [具体怎么做]

**💬 建议立即发送的话术：**
> [一段可以直接复制发给客户的文字]

**⏰ 最佳跟进时机：** [什么时候再联系]
---

### 诊断模式的关键原则

1. **每次只问一个问题**，不要一次性列一堆问题把员工吓跑
2. **用选择题降低输入成本**，让员工点选而不是打字
3. **最后一定要给具体动作**，不能只分析不给方案
4. **话术必须可直接复制使用**，不要给空泛的建议
5. **诊断结果自动标记为「诊断」类型**，方便后续数据统计

### 常见销售问题速查表

| 症状 | 可能原因 | 推荐方案 |
|-----|---------|---------|
| 聊很多但不报名 | 信任不够/价值感不足 | 发真实案例+算账+制造稀缺 |
| 发了资料不回 | 资料不匹配/时机不对 | 换一种资料/换一个切入点重新破冰 |
| 一说价格就跑 | 太早报价/价值没建立 | 先讲案例和风险，价格放后面 |
| 说要考虑然后消失 | 没有明确下一步 | 约定跟进时间+给一个行动理由 |
| 每次都问同样的问题 | 客户没听进去/不信任 | 换个角度讲/用不同形式（视频/案例）|`;`;

        let conversationHistory = [];
        
        // ===== 数据收集 =====
        const STORAGE_KEY = '_fapai_convos';

        function loadConversations() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        }

        function saveConversation(userMsg, aiReply) {
            let convos = loadConversations();
            // 自动判断对话类型
            let convoType = '话术咨询';
            const diagKeywords = ['诊断','帮我分析','转化率低','客户不回','聊了很多没成交','帮我看看这个问题','销售问题'];
            const isDiagnosis = diagKeywords.some(k => userMsg.includes(k));
            
            if (isDiagnosis) {
                convoType = '销售诊断';
            } else if (userMsg.includes('贵') || userMsg.includes('价格')) {
                convoType = '价格异议';
            } else if (userMsg.includes('考虑') || userMsg.includes('再看看')) {
                convoType = '犹豫/拖延';
            } else if (userMsg.includes('风险') || userMsg.includes('靠谱')) {
                convoType = '信任问题';
            }
            
            convos.push({
                id: Date.now(),
                time: new Date().toISOString(),
                question: userMsg,
                answer: aiReply,
                feedback: null,  // null | 'good' | 'bad'
                type: convoType  // 新增：对话类型
            });
            // 保留最近500条
            if (convos.length > 500) convos = convos.slice(-500);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(convos));
        }

        function updateFeedback(convoId, type) {
            let convos = loadConversations();
            const item = convos.find(c => c.id === convoId);
            if (item) item.feedback = type;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(convos));
        }

        // ===== 数据面板 =====
        const PANEL_PASSWORD = '942134';
        
        function toggleDataPanel() {
            // 先要求输入密码
            const pw = prompt('🔒 请输入密码查看数据：');
            if (pw === null) return; // 用户点了取消
            if (pw !== PANEL_PASSWORD) {
                alert('密码错误！');
                return;
            }
            document.getElementById('dataPanel').classList.add('show');
            renderDataPanel();
        }

        function renderDataPanel() {
            const convos = loadConversations();
            const body = document.getElementById('dataPanelBody');

            if (convos.length === 0) {
                body.innerHTML = '<div class="empty-state">暂无对话记录<br><small style="color:#ccc">员工使用后会自动收集</small></div>';
                return;
            }

            // 统计
            const total = convos.length;
            const goodCount = convos.filter(c => c.feedback === 'good').length;
            const badCount = convos.filter(c => c.feedback === 'bad').length;

            // 问题分类统计（使用type字段）
            const categories = {};
            convos.forEach(c => {
                const cat = c.type || '其他';
                categories[cat] = (categories[cat] || 0) + 1;
            });

            let statsHtml = `
                <div class="stat-row">
                    <div class="stat-card"><div class="num">${total}</div><div class="label">总对话数</div></div>
                    <div class="stat-card"><div class="num">${goodCount}</div><div class="label">👍 有用</div></div>
                    <div class="stat-card"><div class="num">${badCount}</div><div class="label">👎 需改进</div></div>
                    <div class="stat-card"><div class="num">${total > 0 ? Math.round(goodCount/(goodCount+badCount)*100) : 0}%</div><div class="label">好评率</div></div>
                </div>
                <h4 style="margin-bottom:10px;font-size:14px;">📋 问题类型分布</h4>
                <div class="stat-row" style="margin-bottom:20px;">
                    ${Object.entries(categories).map(([k,v]) =>
                        `<div class="stat-card"><div class="num">${v}</div><div class="label">${k}</div></div>`
                    ).join('')}
                </div>
                <h4 style="margin-bottom:10px;font-size:14px;">💬 最近对话记录（倒序）</h4>
            `;

            // 最近20条对话
            const recent = [...convos].reverse().slice(0, 20);
            statsHtml += recent.map(c => `
                <div class="conv-item">
                    <div class="time">⏰ ${new Date(c.time).toLocaleString('zh-CN')}</div>
                    <div class="q">❓ ${escapeHtml(c.question)}</div>
                    <div class="a">💬 ${escapeHtml(c.answer.substring(0, 300))}${c.answer.length > 300 ? '...' : ''}</div>
                    <div class="tags">
                        <span class="tag tag-${c.feedback || 'none'}">${
                            c.feedback === 'good' ? '👍 有用' :
                            c.feedback === 'bad' ? '👎 需改进' : '○ 未评价'
                        }</span>
                    </div>
                </div>
            `).join('');

            statsHtml += `
                <button class="export-btn" onclick="exportData()">📥 导出所有数据（CSV）</button>
                <button class="clear-btn" onclick="clearData()">🗑 清除本地数据</button>
            `;

            body.innerHTML = statsHtml;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function exportData() {
            const convos = loadConversations();
            if (convos.length === 0) { alert('没有数据可导出'); return; }

            // CSV头部
            let csv = '\uFEFF时间,用户输入,AI回答,反馈\n';
            convos.forEach(c => {
                csv += `"${c.time}","${c.question.replace(/"/g,'""')}","${c.answer.replace(/"/g,'""').replace(/\n/g,' ')}","${c.feedback||''}"\n`;
            });

            const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `法拍房销售助手_数据_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('已导出！');
        }

        function clearData() {
            if (!confirm('确定清除所有本地对话数据吗？此操作不可恢复！')) return;
            localStorage.removeItem(STORAGE_KEY);
            renderDataPanel();
            showToast('已清除');
        }
        // ===================

        function autoResize(ta) { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 120) + 'px'; }

        function handleKeydown(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

        function sendQuick(text) { document.getElementById('userInput').value = text; sendMessage(); }

        // ===== 销售诊断模式 =====
        function sendDiagnosis() {
            const diagPrompt = `【销售诊断模式】请帮我诊断我的销售问题。

我会按你的引导逐步提供信息，请你：
1. 先问我现在这个客户处于什么阶段
2. 根据我的回答继续追问关键信息（客户说了什么、我试过什么方法）
3. 最后给出：问题原因分析 + 3个可执行的改进动作 + 1句可以直接发给客户的话术

开始吧，先问我第一个问题。`;
            document.getElementById('userInput').value = '';
            // 直接作为消息发送
            const input = document.getElementById('userInput');
            input.value = diagPrompt;
            sendMessage();
        }

        function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }

        function renderMarkdown(text) {
            return text
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h3>$1</h3>')
                .replace(/^(?:>\s?|＞\s?)(.+)$/gm, '<blockquote>$1</blockquote>')
                .replace(/^- (.+)$/gm, '<li>$1</li>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        }

        function addMessage(content, isUser, convoId) {
            const container = document.getElementById('chatContainer');
            const welcome = container.querySelector('.welcome-card');
            if (welcome) welcome.remove();

            const div = document.createElement('div');
            div.className = 'message ' + (isUser ? 'user' : 'assistant');

            if (!isUser) {
                div.innerHTML = `<div class="message-content">${renderMarkdown(content)}</div>
                    <div class="feedback"><button onclick="fb(${convoId},'good',this)">👍 有用</button><button onclick="fb(${convoId},'bad',this)">👎 需改进</button></div>`;
            } else {
                div.textContent = content;
            }
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function showTyping() {
            const c = document.getElementById('chatContainer');
            const d = document.createElement('div');
            d.className = 'typing'; d.id = 'typing';
            d.innerHTML = '<span></span><span></span><span></span>';
            c.appendChild(d);
            c.scrollTop = c.scrollHeight;
        }
        function hideTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

        function fb(convoId, type, btn) {
            updateFeedback(convoId, type);
            btn.parentNode.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            showToast(type==='good' ? '感谢反馈！' : '收到！我们会优化。');
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            const msg = input.value.trim();
            if (!msg) return;

            const convoId = Date.now();
            addMessage(msg, true);
            conversationHistory.push({role:'user', content:msg});
            input.value = ''; input.style.height = 'auto';
            showTyping(); btn.disabled = true;

            try {
                const r = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json','Authorization':`Bearer ${API_KEY}`},
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [
                            {role:'system',content:SYSTEM_PROMPT},
                            ...conversationHistory.slice(-10)
                        ],
                        temperature: 0.7,
                        max_tokens: 2000
                    })
                });
                if (!r.ok) throw new Error('请求失败');
                const data = await r.json();
                hideTyping();
                const reply = data.choices[0].message.content;
                addMessage(reply, false, convoId);
                conversationHistory.push({role:'assistant', content:reply});
                
                // 收集对话数据
                saveConversation(msg, reply);
            } catch(e) {
                hideTyping();
                addMessage('抱歉，出错了：' + e.message + '\n\n请稍后重试。', false);
            } finally {
                btn.disabled = false;
            }
        }
    </script>
